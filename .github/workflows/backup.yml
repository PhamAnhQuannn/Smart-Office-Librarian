name: Backup

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  configuration-check:
    name: Backup Configuration Check
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check required database secrets
        id: check
        shell: bash
        env:
          PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
          PROD_DB_PORT: ${{ secrets.PROD_DB_PORT }}
          PROD_DB_NAME: ${{ secrets.PROD_DB_NAME }}
          PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          missing=0
          for key in PROD_DB_HOST PROD_DB_PORT PROD_DB_NAME PROD_DB_USER PROD_DB_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >> "$GITHUB_STEP_SUMMARY"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Backup workflow is fully configured." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Backup workflow configuration is incomplete; database backup step skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  postgres-backup:
    name: PostgreSQL Backup
    needs: configuration-check
    if: ${{ needs.configuration-check.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Run backup script
        shell: bash
        env:
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DB_PORT: ${{ secrets.PROD_DB_PORT }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          BACKUP_DIR: ${{ runner.temp }}/postgres-backups
          RETENTION_DAYS: "7"
        run: |
          chmod +x infra/scripts/backup.sh
          infra/scripts/backup.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_id }}
          path: ${{ runner.temp }}/postgres-backups/*.sql.gz
          if-no-files-found: error
