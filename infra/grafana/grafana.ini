[server]
protocol = http
http_port = 3001
domain = localhost
root_url = http://localhost:3001/

[security]
admin_user = admin
# Override admin password through GF_SECURITY_ADMIN_PASSWORD environment variable.
# Do NOT commit a plaintext password here.

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/rag_performance.json

[log]
mode = console
level = info

[analytics]
reporting_enabled = false
check_for_updates = false
