services:
	api:
		command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
		environment:
			APP_ENV: dev
		volumes:
			- ../../backend:/app

	worker:
		command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=1
		environment:
			APP_ENV: dev
		volumes:
			- ../../backend:/app

	frontend:
		command: npm run dev -- --hostname 0.0.0.0 --port 3101
		environment:
			NODE_ENV: development
			NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
		volumes:
			- ../../frontend:/app
			- /app/node_modules

	postgres:
		ports:
			- "5432:5432"

	redis:
		ports:
			- "6379:6379"
