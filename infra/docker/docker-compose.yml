services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    image: embedlyzer/api:latest
    env_file:
      - ../../backend/.env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - embedlyzer_net

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    image: embedlyzer/worker:latest
    env_file:
      - ../../backend/.env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - embedlyzer_net

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    image: embedlyzer/frontend:latest
    environment:
      NODE_ENV: production
      PORT: "3101"
      HOSTNAME: 0.0.0.0
    ports:
      - "3101:3101"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3101').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - embedlyzer_net

  postgres:
    image: postgres:15-alpine
    env_file:
      - ../../backend/.env
    environment:
      POSTGRES_DB: embedlyzer
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d embedlyzer"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - embedlyzer_net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped
    networks:
      - embedlyzer_net

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-35.175.156.119}
    volumes:
      - ../../infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - embedlyzer_net

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ../../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ../../infra/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - embedlyzer_net

  grafana:
    image: grafana/grafana:10.4.2
    env_file:
      - ../../backend/.env
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_PATHS_CONFIG: /etc/grafana/grafana.ini
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3001:3001"
    volumes:
      - ../../infra/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ../../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - embedlyzer_net

networks:
  embedlyzer_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
