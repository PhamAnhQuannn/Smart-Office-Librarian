# Prometheus recording rules — Embedlyzer
#
# Pre-computes expensive range-query expressions so dashboards and alerts
# can reference cheap instant-query names instead of re-evaluating
# high-cardinality histograms on every render.
#
# Baselines (BASELINES.md):
#   e2e_p95_ms    = 1869 ms
#   retrieval_p95 = 489 ms
#   ttft_p95      = 492 ms

groups:

  # ── End-to-end latency ─────────────────────────────────────────────────────
  - name: embedlyzer_latency_recording
    interval: 30s
    rules:

      # 5-minute p50, p95, p99 for the full query round-trip
      - record: job:librarian_query_duration_seconds:p50_5m
        expr: >
          histogram_quantile(0.50,
            sum(rate(librarian_query_duration_seconds_bucket[5m])) by (le, namespace)
          )

      - record: job:librarian_query_duration_seconds:p95_5m
        expr: >
          histogram_quantile(0.95,
            sum(rate(librarian_query_duration_seconds_bucket[5m])) by (le, namespace)
          )

      - record: job:librarian_query_duration_seconds:p99_5m
        expr: >
          histogram_quantile(0.99,
            sum(rate(librarian_query_duration_seconds_bucket[5m])) by (le, namespace)
          )

      # 1-hour p95 (for SLO tracking)
      - record: job:librarian_query_duration_seconds:p95_1h
        expr: >
          histogram_quantile(0.95,
            sum(rate(librarian_query_duration_seconds_bucket[1h])) by (le)
          )

  # ── Retrieval stage ────────────────────────────────────────────────────────
  - name: embedlyzer_retrieval_recording
    interval: 30s
    rules:

      - record: job:librarian_retrieval_duration_seconds:p95_5m
        expr: >
          histogram_quantile(0.95,
            sum(rate(librarian_retrieval_duration_seconds_bucket[5m])) by (le, namespace)
          )

      - record: job:librarian_retrieval_duration_seconds:p50_5m
        expr: >
          histogram_quantile(0.50,
            sum(rate(librarian_retrieval_duration_seconds_bucket[5m])) by (le, namespace)
          )

  # ── Time-to-first-token (TTFT) ─────────────────────────────────────────────
  - name: embedlyzer_ttft_recording
    interval: 30s
    rules:

      - record: job:librarian_ttft_seconds:p95_5m
        expr: >
          histogram_quantile(0.95,
            sum(rate(librarian_ttft_seconds_bucket[5m])) by (le)
          )

      - record: job:librarian_ttft_seconds:p50_5m
        expr: >
          histogram_quantile(0.50,
            sum(rate(librarian_ttft_seconds_bucket[5m])) by (le)
          )

  # ── Error rates ────────────────────────────────────────────────────────────
  - name: embedlyzer_error_rate_recording
    interval: 30s
    rules:

      # Fraction of queries that ended in HTTP 5xx over the last 5 minutes
      - record: job:librarian_error_rate_5xx:ratio_5m
        expr: >
          (
            sum(rate(librarian_errors_total{code="HTTP_5XX"}[5m]))
            /
            (sum(rate(librarian_queries_total[5m])) + 0.001)
          )

      # Refusal rate (LOW_SIMILARITY + BUDGET_EXCEEDED) over 5 minutes
      - record: job:librarian_refusal_rate:ratio_5m
        expr: >
          (
            sum(rate(librarian_refusals_total[5m]))
            /
            (sum(rate(librarian_queries_total[5m])) + 0.001)
          )

  # ── Throughput ─────────────────────────────────────────────────────────────
  - name: embedlyzer_throughput_recording
    interval: 30s
    rules:

      # Queries per second (moving average over 5 minutes)
      - record: job:librarian_queries:rate_5m
        expr: sum(rate(librarian_queries_total[5m])) by (namespace)

      # Active SSE streams right now
      - record: job:librarian_active_streams:gauge
        expr: sum(librarian_active_streams) by (namespace)

  # ── Embedding cache ────────────────────────────────────────────────────────
  - name: embedlyzer_cache_recording
    interval: 60s
    rules:

      # Embedding cache hit ratio over last 5 minutes
      - record: job:librarian_embedding_cache:hit_ratio_5m
        expr: >
          (
            sum(rate(librarian_cache_hits_total{cache="embedding"}[5m]))
            /
            (
              sum(rate(librarian_cache_hits_total{cache="embedding"}[5m]))
              + sum(rate(librarian_cache_misses_total{cache="embedding"}[5m]))
              + 0.001
            )
          )

  # ── Ingest pipeline ────────────────────────────────────────────────────────
  - name: embedlyzer_ingest_recording
    interval: 60s
    rules:

      - record: job:librarian_ingest_duration_seconds:p95_5m
        expr: >
          histogram_quantile(0.95,
            sum(rate(librarian_ingest_duration_seconds_bucket[5m])) by (le)
          )

      # Ingest failure rate
      - record: job:librarian_ingest_failure_rate:ratio_5m
        expr: >
          (
            sum(rate(librarian_ingest_runs_total{status="failed"}[5m]))
            /
            (sum(rate(librarian_ingest_runs_total[5m])) + 0.001)
          )
