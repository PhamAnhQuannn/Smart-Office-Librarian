# Alembic configuration file for Embedlyzer backend.
# Run migrations from the backend/ directory:
#   alembic upgrade head
#   alembic revision --autogenerate -m "describe change"
#
# The DATABASE_URL environment variable overrides sqlalchemy.url.

[alembic]
script_location = app/db/migrations

# Default connection string (override via DATABASE_URL env var).
sqlalchemy.url = postgresql+psycopg://embedlyzer:embedlyzer@localhost:5432/embedlyzer

# Timezone for migration timestamps.
timezone = UTC

# Maximum length of migration message in filename.
truncate_slug_length = 40

# Output encoding for *.py files generated by Alembic.
output_encoding = utf-8


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
